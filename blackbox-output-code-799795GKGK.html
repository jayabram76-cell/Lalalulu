<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warung Resep Nusantara</title>
    <!-- Mengambil Font yang bernuansa klasik/Indonesia -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #8B4513; /* Cokelat Kayu */
            --secondary-color: #D2691E; /* Cokelat Tembaga */
            --bg-color: #FDF5E6; /* Off-white / Cream */
            --card-bg: #FFFFFF;
            --text-color: #333;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#e6d5b8 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            padding: 0;
            color: var(--text-color);
        }

        /* Header dengan nuansa tradisional */
        header {
            background-color: var(--primary-color);
            color: #fff;
            text-align: center;
            padding: 40px 20px;
            border-bottom: 5px solid var(--secondary-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
        }

        p.subtitle {
            font-style: italic;
            opacity: 0.9;
            margin-top: 10px;
        }

        /* Container Pencarian */
        .search-container {
            max-width: 600px;
            margin: -25px auto 30px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        #search-input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid var(--primary-color);
            font-size: 1.1rem;
            outline: none;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.2);
            transition: all 0.3s ease;
        }

        #search-input:focus {
            box-shadow: 0 4px 20px rgba(139, 69, 19, 0.4);
            transform: scale(1.02);
        }

        /* Grid Resep */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* Kartu Resep */
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
